apiVersion: v1
kind: Secret
metadata:
  name: sonarr-config-volsync-minio
  namespace: media
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: ${VOLSYNC_BACKUP_MAIN_ACCESSKEY}
  AWS_SECRET_ACCESS_KEY: ${VOLSYNC_BACKUP_MAIN_SECRETKEY}
  RESTIC_PASSWORD: ${VOLSYNC_BACKUP_MAIN_ENCRKEY}
  RESTIC_REPOSITORY: s3:${VOLSYNC_BACKUP_MAIN_URL}/${VOLSYNC_BACKUP_MAIN_BUCKET}/media/volsync/sonarr-config-volsync-minio
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: sonarr-config-minio
  namespace: media
spec:
  sourcePVC: sonarr-config
  trigger:
    schedule: "30 4 * * *"
  restic:
    repository: sonarr-config-volsync-minio
    copyMethod: Direct
    cacheCapacity: 10Gi
    pruneIntervalDays: 7
    retain:
      daily: 7
      weekly: 4
      monthly: 3
      yearly: 1
    accessModes:
      - ReadWriteOnce
    moverSecurityContext:
      runAsUser: 0
      runAsGroup: 0
      fsGroup: 568
