apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: qbittorrent
    namespace: media
spec:
    interval: 15m
    chart:
        spec:
            chart: qbittorrent
            version: 25.0.3
            sourceRef:
                kind: HelmRepository
                name: truecharts
                namespace: flux-system
            interval: 15m
    timeout: 20m
    maxHistory: 3
    install:
        remediation:
            retries: 3
    upgrade:
        cleanupOnFail: true
        remediation:
            retries: 3
    uninstall:
        keepHistory: false
    postRenderers:
        - kustomize:
            patches:
                - target:
                      kind: Deployment
                      name: qbittorrent
                  patch: |
                    apiVersion: apps/v1
                    kind: Deployment
                    metadata:
                        name: qbittorrent
                    spec:
                        template:
                            spec:
                                containers:
                                    - name: qbittorrent
                                      image: ghcr.io/home-operations/qbittorrent:5.1.4
                - target:
                      kind: CronJob
                      name: qbittorrent-qbitportforward
                  patch: |
                    apiVersion: batch/v1
                    kind: CronJob
                    metadata:
                        name: qbittorrent-qbitportforward
                    spec:
                        jobTemplate:
                            spec:
                                template:
                                    spec:
                                        containers:
                                            - name: qbittorrent
                                              command:
                                                - /bin/sh
                                                - -c
                                                - |
                                                  set -eu
                                                  echo "Attempting to retrieve port from Gluetun via compatibility endpoint..."
                                                  port_number=$(curl -L --fail --silent --show-error "$GTN_ADDR/v1/openvpn/portforwarded" | jq -r '.port')
                                                  if [ -z "$port_number" ] || [ "$port_number" = "0" ]; then
                                                    echo "Could not get current forwarded port from gluetun, exiting..."
                                                    exit 1
                                                  fi
                                                  echo "Port number successfully retrieved from Gluetun: $port_number"
                                                  curl --fail --silent --show-error --cookie-jar /tmp/cookies.txt --cookie /tmp/cookies.txt --header "Referer: $QBT_ADDR" --data-urlencode "username=$QBT_USERNAME" --data-urlencode "password=$QBT_PASSWORD" "$QBT_ADDR/api/v2/auth/login" >/dev/null
                                                  listen_port=$(curl --fail --silent --show-error --cookie-jar /tmp/cookies.txt --cookie /tmp/cookies.txt "$QBT_ADDR/api/v2/app/preferences" | jq -r '.listen_port')
                                                  if [ "$port_number" = "$listen_port" ]; then
                                                    echo "Port already set, exiting..."
                                                    exit 0
                                                  fi
                                                  echo "Updating port to $port_number"
                                                  curl --fail --silent --show-error --cookie-jar /tmp/cookies.txt --cookie /tmp/cookies.txt --data-urlencode "json={\"listen_port\": $port_number}" "$QBT_ADDR/api/v2/app/setPreferences"
                                                  echo "Successfully updated port"
    values:
        gluetunImage:
            repository: ghcr.io/qdm12/gluetun
            tag: v3.41.1
        credentials:
            ${VOLSYNC_BACKUP_MAIN_NAME}:
                accessKey: ${VOLSYNC_BACKUP_MAIN_ACCESSKEY}
                bucket: ${VOLSYNC_BACKUP_MAIN_BUCKET}
                encrKey: ${VOLSYNC_BACKUP_MAIN_ENCRKEY}
                name: ${VOLSYNC_BACKUP_MAIN_NAME}
                path: ""
                secretKey: ${VOLSYNC_BACKUP_MAIN_SECRETKEY}
                type: s3
                url: ${VOLSYNC_BACKUP_MAIN_URL}
        qbitportforward:
            enabled: true
            QBT_USERNAME: "${GENERIC_USER}"
            QBT_PASSWORD: "${GENERIC_PASSWORD}"
        addons:
            gluetun:
                enabled: true
                container:
                    env:
                        FIREWALL: "on"
                        FIREWALL_OUTBOUND_SUBNETS: "192.168.0.0/22"
                        VPN_TYPE: "${MAIN_VPN_TYPE}"
                        VPN_SERVICE_PROVIDER: "${MAIN_VPN_SERVICE_PROVIDER}"
                        WIREGUARD_PRIVATE_KEY: "${MAIN_WIREGUARD_PRIVATE_KEY}"
                        WIREGUARD_PUBLIC_KEY: "${MAIN_WIREGUARD_PUBLIC_KEY}"
                        WIREGUARD_ADDRESSES: "${MAIN_WIREGUARD_ADDRESSES}"
                        SERVER_COUNTRIES: "${MAIN_VPN_COUNTRIES}"
                        SERVER_CITIES: "${MAIN_VPN_CITIES}"
                        # Explicitly clear legacy endpoint variables to allow provider-based selection
                        VPN_ENDPOINT_IP: ""
                        VPN_ENDPOINT_PORT: ""
                        PORT_FORWARD_ONLY: "on"
                        VPN_PORT_FORWARDING: "on"
                        HEALTH_RESTART_VPN: "false"
                        FIREWALL_INPUT_PORTS: "10095,8000"

                    resources:
                        limits:
                            truecharts.org/tun: 1
                killSwitch: true
        ingress:
            main:
                enabled: true
                integrations:
                    traefik:
                        enabled: false
                        entrypoints:
                            - websecure
                        middlewares:
                            - name: authentik
                    certManager:
                        enabled: true
                        certificateIssuer: domain-0-le-prod
                ingressClassName: internal
                hosts:
                    - host: t.${DOMAIN_0}
                      paths:
                          - path: /
        workload:
            qbitportforward:
                schedule: "* * * * *"
        persistence:
            config:
                enabled: true
                type: pvc
                existingClaim: qbittorrent-config
                accessMode: ReadWriteOnce
                size: "100Gi"
                retain: true
            media:
                enabled: true
                type: nfs
                mountPath: /data
                path: /mnt/Media
                server: ${NAS_DOMAIN}
            themes:
                enabled: true
                type: nfs
                mountPath: /config/themes
                path: /mnt/Apps/config/qbittorrent/themes
                server: ${NAS_DOMAIN}
            backup:
                enabled: false
                type: nfs
                mountPath: /backup
                path: /mnt/Apps/config/qbittorrent/qBittorrent
                server: ${NAS_DOMAIN}
