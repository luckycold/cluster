apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: mealie
    namespace: mealie
spec:
    interval: 5m
    postRenderers:
        - kustomize:
            patches:
                - target:
                    kind: Deployment
                    name: mealie
                  patch: |
                    - op: add
                      path: /spec/template/spec/initContainers/-
                      value:
                        name: mealie-fix-data-perms
                        image: busybox:1.36
                        command:
                          - /bin/sh
                          - -c
                        args:
                          - mkdir -p /app/data && chmod 0770 /app/data && chgrp 568 /app/data
                        securityContext:
                          runAsUser: 0
                          runAsGroup: 0
                        volumeMounts:
                          - name: data
                            mountPath: /app/data
    chart:
        spec:
            chart: mealie
            version: 26.28.0
            sourceRef:
                kind: HelmRepository
                name: truecharts
                namespace: flux-system
    releaseName: mealie
    values:
        TZ: US/Central
        credentials:
            ${VOLSYNC_BACKUP_MAIN_NAME}:
                accessKey: ${VOLSYNC_BACKUP_MAIN_ACCESSKEY}
                bucket: ${VOLSYNC_BACKUP_MAIN_BUCKET}
                encrKey: ${VOLSYNC_BACKUP_MAIN_ENCRKEY}
                name: ${VOLSYNC_BACKUP_MAIN_NAME}
                path: ""
                secretKey: ${VOLSYNC_BACKUP_MAIN_SECRETKEY}
                type: s3
                url: ${VOLSYNC_BACKUP_MAIN_URL}
            cnpg-b2:
                accessKey: ${CNPG_BACKUP_B2_ACCESSKEY}
                bucket: ${CNPG_BACKUP_B2_BUCKET}
                encrKey: ${VOLSYNC_BACKUP_MAIN_ENCRKEY}
                name: cnpg-b2
                path: ""
                secretKey: ${CNPG_BACKUP_B2_SECRETKEY}
                type: s3
                url: ${CNPG_BACKUP_B2_ENDPOINT}
        ingress:
            main:
                enabled: true
                ingressClassName: external
                hosts:
                    - host: m.${DOMAIN_0}
                      paths:
                        - path: /
                integrations:
                    certManager:
                        certificateIssuer: domain-0-le-prod
                        enabled: true
                    homepage:
                        enabled: false
        persistence:
            data:
                enabled: true
                type: pvc
                accessMode: ReadWriteOnce
                size: 100Gi
                retain: true
        release_name: mealie
        smtp:
            enabled: true
            user: ${ADMIN_EMAIL}
            password: ${SMTP_PASSWORD}
            host: ${SMTP_SERVER}
            from_email: ${ADMIN_EMAIL}
        cnpg:
            main:
                password: ${MEALIE_CNPG_PASSWORD}
                backups:
                    credentials: cnpg-b2
                    enabled: true
                    revision: "1"
                cluster:
                    instances: 1
                    singleNode: true
        workload:
            main:
                podSpec:
                    containers:
                        main:
                            env:
                                OPENAI_API_KEY: ${OPENAI_API_KEY}

                                # OIDC Authentication Configuration
                                OIDC_AUTH_ENABLED: "true"
                                OIDC_CONFIGURATION_URL: "https://auth.${DOMAIN_0}/.well-known/openid-configuration"
                                OIDC_CLIENT_ID: "mealie"
                                OIDC_CLIENT_SECRET: "${MEALIE_OIDC_CLIENT_SECRET}"
                                OIDC_SIGNUP_ENABLED: 'true'
                                OIDC_AUTO_REDIRECT: 'false'
                                OIDC_ADMIN_GROUP: 'admin'
                                OIDC_USER_GROUP: 'user'
