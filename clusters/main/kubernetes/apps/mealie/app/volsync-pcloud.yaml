apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: mealie-data-pcloud
  namespace: mealie
spec:
  sourcePVC: mealie-data
  trigger:
    schedule: "0 0 * * *"
  restic:
    repository: mealie-data-volsync-pcloud
    copyMethod: Snapshot
    pruneIntervalDays: 7
    cacheCapacity: 10Gi
    retain:
      daily: 3
      weekly: 4
      monthly: 2
      within: 30d
    accessModes:
      - ReadWriteOnce
    moverSecurityContext:
      runAsUser: 0
      runAsGroup: 0
      fsGroup: 568
