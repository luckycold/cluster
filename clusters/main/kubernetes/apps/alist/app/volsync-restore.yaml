apiVersion: v1
kind: Secret
metadata:
  name: alist-data-volsync-minio
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: ${VOLSYNC_BACKUP_MAIN_ACCESSKEY}
  AWS_SECRET_ACCESS_KEY: ${VOLSYNC_BACKUP_MAIN_SECRETKEY}
  RESTIC_PASSWORD: ${VOLSYNC_BACKUP_MAIN_ENCRKEY}
  RESTIC_REPOSITORY: s3:${VOLSYNC_BACKUP_MAIN_URL}/${VOLSYNC_BACKUP_MAIN_BUCKET}/alist/volsync/data-volsync-minio
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: alist-data-minio-dest
spec:
  trigger:
    manual: restore-once
  restic:
    repository: alist-data-volsync-minio
    destinationPVC: alist-data
    copyMethod: Direct
    cacheCapacity: 10Gi
    cleanupCachePVC: false
    accessModes:
      - ReadWriteOnce
    moverSecurityContext:
      runAsUser: 0
      runAsGroup: 0
      fsGroup: 568
