apiVersion: v1
kind: Secret
metadata:
  name: freshrss-config-volsync-pcloud
  namespace: freshrss
type: Opaque
stringData:
  RESTIC_PASSWORD: ${VOLSYNC_BACKUP_MAIN_ENCRKEY}
  RESTIC_REPOSITORY: rclone:pcloud:${VOLSYNC_BACKUP_PCLOUD_REMOTE_PATH}/${VOLSYNC_BACKUP_PCLOUD_REPO_SUBPATH}/freshrss-config
  RCLONE_CONFIG_PCLOUD_TYPE: pcloud
  RCLONE_CONFIG_PCLOUD_HOSTNAME: ${VOLSYNC_BACKUP_PCLOUD_HOSTNAME}
  RCLONE_CONFIG_PCLOUD_TOKEN: ${VOLSYNC_BACKUP_PCLOUD_TOKEN_JSON}
