apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: freshrss-config-pcloud
spec:
  sourcePVC: freshrss-config-longhorn-v2
  trigger:
    manual: pcloud-test-20260319
  restic:
    repository: freshrss-config-volsync-pcloud
    copyMethod: Snapshot
    pruneIntervalDays: 7
    cacheCapacity: 10Gi
    retain:
      daily: 3
      weekly: 4
      monthly: 2
      within: 30d
    accessModes:
      - ReadWriteOnce
    moverSecurityContext:
      runAsUser: 0
      runAsGroup: 0
      fsGroup: 568
