apiVersion: apps/v1
kind: Deployment
metadata:
  name: freshrss
  annotations:
    # Temporary migration aid while moving from HelmRelease -> raw manifests.
    # Remove once transition is stable.
    kustomize.toolkit.fluxcd.io/force: enabled
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/instance: freshrss
      app.kubernetes.io/name: freshrss
      pod.name: main
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: freshrss
        app.kubernetes.io/name: freshrss
        pod.name: main
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups:
          - 568
      containers:
        - name: freshrss
          # renovate: datasource=docker depName=ghcr.io/linuxserver/freshrss
          image: ghcr.io/linuxserver/freshrss:1.28.1@sha256:b75efdc71fb365aab41764bfdb00dd097cef52594a0481d2bc91103af6e98588
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: US/Central
            - name: UMASK
              value: "0022"
            - name: PUID
              value: "568"
            - name: PGID
              value: "568"
          ports:
            - name: main
              containerPort: 80
          startupProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 12
            timeoutSeconds: 5
            successThreshold: 2
            failureThreshold: 4
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 12
            periodSeconds: 15
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 5
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: freshrss-config
---
apiVersion: v1
kind: Service
metadata:
  name: freshrss
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: freshrss
    app.kubernetes.io/name: freshrss
    pod.name: main
  ports:
    - name: main
      port: 10010
      targetPort: 80
