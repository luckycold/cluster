apiVersion: v1
kind: Secret
metadata:
  name: lldap-data-volsync-minio
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: ${VOLSYNC_BACKUP_MAIN_ACCESSKEY}
  AWS_SECRET_ACCESS_KEY: ${VOLSYNC_BACKUP_MAIN_SECRETKEY}
  RESTIC_PASSWORD: ${VOLSYNC_BACKUP_MAIN_ENCRKEY}
  RESTIC_REPOSITORY: s3:${VOLSYNC_BACKUP_MAIN_URL}/${VOLSYNC_BACKUP_MAIN_BUCKET}/lldap/volsync/data-volsync-${VOLSYNC_BACKUP_MAIN_NAME}
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: lldap-data-minio
spec:
  paused: true
  sourcePVC: lldap-data
  trigger:
    schedule: "0 0 * * *"
  restic:
    repository: lldap-data-volsync-minio
    copyMethod: Snapshot
    pruneIntervalDays: 7
    cacheCapacity: 10Gi
    retain:
      hourly: 6
      daily: 5
      weekly: 4
      monthly: 3
      yearly: 1
    accessModes:
      - ReadWriteOnce
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: lldap-data-minio-dest
spec:
  trigger:
    manual: restore-once
  restic:
    repository: lldap-data-volsync-minio
    destinationPVC: lldap-data
    copyMethod: Direct
    cacheCapacity: 10Gi
    cleanupCachePVC: false
    accessModes:
      - ReadWriteOnce
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
