apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: lldap-data-pcloud
spec:
  paused: true
  sourcePVC: lldap-data-longhorn
  trigger:
    schedule: "0 0 * * *"
  restic:
    repository: lldap-data-volsync-pcloud
    copyMethod: Snapshot
    pruneIntervalDays: 7
    cacheCapacity: 10Gi
    retain:
      daily: 3
      weekly: 4
      monthly: 2
      within: 30d
    accessModes:
      - ReadWriteOnce
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
