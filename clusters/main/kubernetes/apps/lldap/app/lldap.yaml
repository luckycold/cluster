apiVersion: apps/v1
kind: Deployment
metadata:
  name: lldap
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/instance: lldap
      app.kubernetes.io/name: lldap
      pod.name: main
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: lldap
        app.kubernetes.io/name: lldap
        pod.name: main
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: lldap-system-cnpg-wait
          image: oci.trueforge.org/containerforge/postgresql-client:1.1.0@sha256:4df4c77540485bbb4a681268b9a7b33b72a51cf9e6c4d4cd8f41db077afe4f8a
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              /bin/sh <<'SCRIPT'
              echo "Executing DB waits..."
              until
                pg_isready -U lldap -d lldap -h lldap-cnpg-main-rw
              do
                sleep 5
              done
              echo "Database available on url: [lldap-cnpg-main-rw]"
              SCRIPT
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 568
            runAsNonRoot: true
            runAsUser: 568
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: devshm
              mountPath: /dev/shm
            - name: shared
              mountPath: /shared
            - name: tmp
              mountPath: /tmp
            - name: varlogs
              mountPath: /var/logs
            - name: varrun
              mountPath: /var/run
      containers:
        - name: lldap
          image: docker.io/nitnelave/lldap:v0.6.2-debian@sha256:713f8f1c7bb769bdcc7dc86b48838ec23e45ce45ab31d562544959360e96c109
          imagePullPolicy: IfNotPresent
          command:
            - /app/lldap
          args:
            - run
          env:
            - name: TZ
              value: US/Central
            - name: LLDAP_HTTP_PORT
              value: "17170"
            - name: LLDAP_HTTP_URL
              value: https://ldap.${DOMAIN_0}
            - name: LLDAP_JWT_SECRET
              value: '[map[secretRef:map[key:LLDAP_JWT_SECRET name:secrets]]]'
            - name: LLDAP_LDAP_BASE_DN
              value: ${LLDAP_LDAP_BASE_DN}
            - name: LLDAP_LDAP_PORT
              value: "3890"
            - name: LLDAP_LDAP_USER_DN
              value: admin
            - name: LLDAP_LDAP_USER_EMAIL
              value: ${ADMIN_EMAIL}
            - name: LLDAP_LDAP_USER_PASS
              value: ${LLDAP_LDAP_USER_PASS}
            - name: LLDAP_SMTP_OPTIONS__ENABLE_PASSWORD_RESET
              value: "true"
            - name: LLDAP_SMTP_OPTIONS__FROM
              value: LLDAP Admin <${ADMIN_EMAIL}>
            - name: LLDAP_SMTP_OPTIONS__PASSWORD
              value: ${SMTP_PASSWORD}
            - name: LLDAP_SMTP_OPTIONS__PORT
              value: "587"
            - name: LLDAP_SMTP_OPTIONS__REPLY_TO
              value: Do not reply <noreply@localhost>
            - name: LLDAP_SMTP_OPTIONS__SERVER
              value: ${SMTP_SERVER}
            - name: LLDAP_SMTP_OPTIONS__SMTP_ENCRYPTION
              value: STARTTLS
            - name: LLDAP_SMTP_OPTIONS__USER
              value: ${ADMIN_EMAIL}
            - name: LLDAP_VERBOSE
              value: "false"
            - name: LLDAP_database_url
              value: postgres://lldap:${LLDAP_CNPG_PASSWORD}@lldap-cnpg-main-rw:5432/lldap
            - name: LLDAP_key_file
              value: /data/private_key
            - name: smtp
              value: "true"
          ports:
            - name: ldap
              containerPort: 3890
            - name: main
              containerPort: 17170
          startupProbe:
            httpGet:
              path: /
              port: 17170
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /
              port: 17170
            initialDelaySeconds: 10
            periodSeconds: 12
            timeoutSeconds: 5
            successThreshold: 2
            failureThreshold: 4
          livenessProbe:
            httpGet:
              path: /
              port: 17170
            initialDelaySeconds: 12
            periodSeconds: 15
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 5
          resources:
            limits:
              cpu: 1500m
              memory: 2400Mi
            requests:
              cpu: 75m
              memory: 200Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: false
            runAsGroup: 568
            runAsNonRoot: true
            runAsUser: 568
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: data
              mountPath: /data
            - name: devshm
              mountPath: /dev/shm
            - name: shared
              mountPath: /shared
            - name: tmp
              mountPath: /tmp
            - name: varlogs
              mountPath: /var/logs
            - name: varrun
              mountPath: /var/run
      securityContext:
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups:
          - 568
      volumes:
        - name: devshm
          emptyDir:
            medium: Memory
            sizeLimit: 2400Mi
        - name: shared
          emptyDir: {}
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 2400Mi
        - name: varlogs
          emptyDir:
            medium: Memory
            sizeLimit: 2400Mi
        - name: varrun
          emptyDir:
            medium: Memory
            sizeLimit: 2400Mi
        - name: data
          persistentVolumeClaim:
            claimName: lldap-data
---
apiVersion: v1
kind: Service
metadata:
  name: lldap
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: lldap
    app.kubernetes.io/name: lldap
    pod.name: main
  ports:
    - name: main
      port: 17170
      targetPort: 17170
---
apiVersion: v1
kind: Service
metadata:
  name: lldap-ldap
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: lldap
    app.kubernetes.io/name: lldap
    pod.name: main
  ports:
    - name: ldap
      port: 3890
      targetPort: 3890
