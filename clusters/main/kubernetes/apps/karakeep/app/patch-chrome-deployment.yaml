apiVersion: apps/v1
kind: Deployment
metadata:
  name: chrome
spec:
  strategy:
    type: Recreate
  template:
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/arch: amd64
      terminationGracePeriodSeconds: 60
      containers:
        - name: chrome
          env:
            - name: TZ
              valueFrom:
                configMapKeyRef:
                  name: karakeep-configuration
                  key: TZ
          readinessProbe:
            tcpSocket:
              port: 9222
            initialDelaySeconds: 10
            periodSeconds: 12
            timeoutSeconds: 5
            successThreshold: 2
            failureThreshold: 4
          livenessProbe:
            tcpSocket:
              port: 9222
            initialDelaySeconds: 12
            periodSeconds: 15
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 5
          startupProbe:
            tcpSocket:
              port: 9222
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 60
          resources:
            requests:
              cpu: 75m
              memory: 200Mi
            limits:
              cpu: 1500m
              memory: 2400Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - CHOWN
                - SETUID
                - SETGID
                - FOWNER
                - DAC_OVERRIDE
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: devshm
          emptyDir:
            medium: Memory
            sizeLimit: 2400Mi
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 2400Mi
