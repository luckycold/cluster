apiVersion: apps/v1
kind: Deployment
metadata:
  name: karakeep-meilisearch
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: karakeep
      app.kubernetes.io/instance: karakeep
      app.kubernetes.io/component: meilisearch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: karakeep
        app.kubernetes.io/instance: karakeep
        app.kubernetes.io/component: meilisearch
      annotations:
        reloader.stakater.com/auto: "true"
        reloader.stakater.com/rollout-strategy: restart
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/arch: amd64
      securityContext:
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups:
          - 568
      terminationGracePeriodSeconds: 60
      containers:
        - name: meilisearch
          # renovate: datasource=docker depName=getmeili/meilisearch
          image: getmeili/meilisearch:v1.11.1
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: US/Central
            - name: MEILI_ENV
              value: production
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: karakeep-secrets
                  key: MEILI_MASTER_KEY
                  optional: true
            - name: MEILI_NO_ANALYTICS
              value: "true"
          ports:
            - name: meili
              containerPort: 7700
          readinessProbe:
            tcpSocket:
              port: meili
            initialDelaySeconds: 10
            periodSeconds: 12
            timeoutSeconds: 5
            successThreshold: 2
            failureThreshold: 4
          livenessProbe:
            tcpSocket:
              port: meili
            initialDelaySeconds: 12
            periodSeconds: 15
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 5
          startupProbe:
            tcpSocket:
              port: meili
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 60
          resources:
            requests:
              cpu: 75m
              memory: 200Mi
            limits:
              cpu: 1500m
              memory: 2400Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - CHOWN
                - SETUID
                - SETGID
                - FOWNER
                - DAC_OVERRIDE
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: meili-data
              mountPath: /meili_data
            - name: devshm
              mountPath: /dev/shm
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: meili-data
          persistentVolumeClaim:
            claimName: hoarder-app-template-meili-data-longhorn
        - name: devshm
          emptyDir:
            medium: Memory
            sizeLimit: 2400Mi
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 2400Mi
