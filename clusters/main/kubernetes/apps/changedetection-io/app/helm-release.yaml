apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: changedetection-io
  namespace: changedetection-io # Assuming a dedicated namespace
spec:
  interval: 15m
  chart:
    spec:
      chart: changedetection-io
      version: 5.20.5
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  releaseName: changedetection-io
  values:
    TZ: US/Central # Adjust timezone if needed
    credentials:
      ${VOLSYNC_BACKUP_MAIN_NAME}:
        accessKey: ${VOLSYNC_BACKUP_MAIN_ACCESSKEY}
        bucket: ${VOLSYNC_BACKUP_MAIN_BUCKET}
        encrKey: ${VOLSYNC_BACKUP_MAIN_ENCRKEY}
        name: ${VOLSYNC_BACKUP_MAIN_NAME}
        secretKey: ${VOLSYNC_BACKUP_MAIN_SECRETKEY}
        type: s3
        url: ${VOLSYNC_BACKUP_MAIN_URL}
    ingress:
      main:
        enabled: true
        ingressClassName: external
        annotations:
          nginx.ingress.kubernetes.io/auth-method: "GET"
          nginx.ingress.kubernetes.io/auth-url: "http://authelia.authelia.svc.cluster.local:9091/api/verify"
          nginx.ingress.kubernetes.io/auth-signin: "https://auth.${DOMAIN_0}?rm=$request_method"
          nginx.ingress.kubernetes.io/auth-response-headers: "Remote-User,Remote-Name,Remote-Groups,Remote-Email"
        hosts:
          - host: "change.${DOMAIN_0}" # Define hostname
            paths:
              - path: /
                pathType: Prefix
        integrations:
          certManager:
            certificateIssuer: domain-0-le-prod # Use the same issuer as authentik
            enabled: true
          traefik:
            allowCors: false
            enabled: false
            entrypoints:
              - websecure

    workload:
      main:
        podSpec:
          containers:
            main:
              env:
                USE_X_SETTINGS: "true" # Using string based on values.yaml
                HIDE_REFERER: "true"   # Using string based on values.yaml
                FETCH_WORKERS: 10

    persistence:
      datastore:
        enabled: true
        mountPath: "/datastore"
