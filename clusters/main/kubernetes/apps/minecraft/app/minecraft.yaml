apiVersion: apps/v1
kind: Deployment
metadata:
  name: minecraft
  annotations:
    # Temporary migration aid: force-recreate once to avoid Helm->Kustomize immutable field conflicts.
    # Remove after transition stabilizes.
    kustomize.toolkit.fluxcd.io/force: enabled
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: minecraft
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minecraft
    spec:
      containers:
        - name: minecraft
          # renovate: datasource=docker depName=ghcr.io/itzg/minecraft-server
          image: ghcr.io/itzg/minecraft-server:2025.8.1@sha256:92681e6745391ed80c7e59ebe9ba9956e787178b9e52c34e734e998bc80a8649
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: US/Central
            - name: SERVER_PORT
              value: "25565"
            - name: QUERY_PORT
              value: "25565"
            - name: RCON_PORT
              value: "25575"
            - name: ENABLE_QUERY
              value: "true"
            - name: EULA
              value: "TRUE"
            - name: GUI
              value: "FALSE"
            - name: OVERRIDE_SERVER_PROPERTIES
              value: "true"
            - name: VERSION
              value: "1.21.3"
            - name: TYPE
              value: PAPER
            - name: DIFFICULTY
              value: normal
            - name: MAX_PLAYERS
              value: "20"
            - name: MAX_WORLD_SIZE
              value: "10000"
            - name: ALLOW_NETHER
              value: "true"
            - name: ANNOUNCE_PLAYER_ACHIEVEMENTS
              value: "true"
            - name: ENABLE_COMMAND_BLOCK
              value: "true"
            - name: FORCE_GAMEMODE
              value: "false"
            - name: GENERATE_STRUCTURES
              value: "true"
            - name: HARDCORE
              value: "false"
            - name: MAX_BUILD_HEIGHT
              value: "256"
            - name: MAX_TICK_TIME
              value: "60000"
            - name: SPAWN_ANIMALS
              value: "true"
            - name: SPAWN_MONSTERS
              value: "true"
            - name: SPAWN_NPCS
              value: "true"
            - name: VIEW_DISTANCE
              value: "16"
            - name: MODE
              value: survival
            - name: MOTD
              value: Carson will join one day :)
            - name: PVP
              value: "true"
            - name: LEVEL_TYPE
              value: DEFAULT
            - name: LEVEL
              value: world
            - name: ONLINE_MODE
              value: "true"
            - name: MAX_MEMORY
              value: 6G
            - name: INIT_MEMORY
              value: 2G
            - name: RCON_PASSWORD
              value: ${GENERIC_PASSWORD}
            - name: ALLOW_FLIGHT
              value: "TRUE"
            - name: CF_API_KEY
              value: ${CURSEFORGE_API_KEY}
            - name: SPIGET_RESOURCES
              value: "34315"
            - name: MODRINTH_ALLOWED_VERSION_TYPE
              value: beta
            - name: MODRINTH_DOWNLOAD_DEPENDENCIES
              value: required
            - name: MODRINTH_PROJECTS
              value: >-
                luckperms,
                viaversion,
                viabackwards,
                worldedit,
                worldguard,
                multiverse-core,
                multiverse-inventories,
                multiverse-portals,
                multiverse-netherportals,
                multiverse-signportals,
                invsee++,
                sleeper,
                waypoints
            - name: PLUGINS
              value: >-
                https://download.geysermc.org/v2/projects/geyser/versions/latest/builds/latest/downloads/spigot,
                https://download.geysermc.org/v2/projects/floodgate/versions/latest/builds/latest/downloads/spigot
            - name: OPS
              value: lukeycold
          resources:
            requests:
              memory: 4Gi
            limits:
              memory: 8Gi
          ports:
            - name: minecraft
              containerPort: 25565
              protocol: TCP
            - name: query
              containerPort: 25565
              protocol: UDP
            - name: rcon
              containerPort: 25575
              protocol: TCP
            - name: bedrock
              containerPort: 19132
              protocol: UDP
            - name: dynmap
              containerPort: 8123
              protocol: TCP
          livenessProbe:
            exec:
              command:
                - mc-health
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - mc-health
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 6
          startupProbe:
            exec:
              command:
                - mc-health
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 30
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minecraft-data-longhorn
---
apiVersion: v1
kind: Service
metadata:
  name: minecraft
  annotations:
    metallb.io/allow-shared-ip: minecraft
spec:
  type: LoadBalancer
  loadBalancerIP: ${MINECRAFT_IP}
  selector:
    app.kubernetes.io/name: minecraft
  ports:
    - name: minecraft
      protocol: TCP
      port: 25565
      targetPort: minecraft
    - name: query
      protocol: UDP
      port: 25565
      targetPort: query
    - name: bedrock
      protocol: UDP
      port: 19132
      targetPort: bedrock
---
apiVersion: v1
kind: Service
metadata:
  name: minecraft-rcon
  annotations:
    metallb.io/allow-shared-ip: minecraft
spec:
  type: LoadBalancer
  loadBalancerIP: ${MINECRAFT_IP}
  selector:
    app.kubernetes.io/name: minecraft
  ports:
    - name: rcon
      protocol: TCP
      port: 25575
      targetPort: rcon
---
apiVersion: v1
kind: Service
metadata:
  name: minecraft-dynmap
spec:
  selector:
    app.kubernetes.io/name: minecraft
  ports:
    - name: dynmap
      protocol: TCP
      port: 8123
      targetPort: dynmap
