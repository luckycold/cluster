apiVersion: apps/v1
kind: Deployment
metadata:
  name: authelia
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/instance: authelia
      app.kubernetes.io/name: authelia
      pod.name: main
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: authelia
        app.kubernetes.io/name: authelia
        pod.name: main
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      initContainers:
        - name: authelia-system-cnpg-wait
          image: oci.trueforge.org/containerforge/postgresql-client:1.1.0@sha256:4df4c77540485bbb4a681268b9a7b33b72a51cf9e6c4d4cd8f41db077afe4f8a
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              /bin/sh <<'SCRIPT'
              echo "Executing DB waits..."
              until
                pg_isready -U authelia -d authelia -h authelia-cnpg-main-rw
              do
                sleep 5
              done
              echo "Database available on url: [authelia-cnpg-main-rw]"
              SCRIPT
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 568
            runAsNonRoot: true
            runAsUser: 568
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: devshm
              mountPath: /dev/shm
            - name: shared
              mountPath: /shared
            - name: tmp
              mountPath: /tmp
            - name: varlogs
              mountPath: /var/logs
            - name: varrun
              mountPath: /var/run
        - name: authelia-system-redis-wait
          image: oci.trueforge.org/containerforge/valkey-tools:1.1.0@sha256:8bbd28e12efc6ee35fc1be5220ea9553739008fb2a4d292e88306150e7e52e79
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              /bin/bash <<'SCRIPT'
              [[ -n "$REDIS_PASSWORD" ]] && export REDISCLI_AUTH="$REDIS_PASSWORD"
              until response=$(timeout -s 3 2 valkey-cli -h "$REDIS_HOST" -p "$REDIS_PORT" ping); do
                echo "Redis not responding... sleeping"
                sleep 10
              done
              if [ "$response" = "PONG" ] || [ "$response" = "LOADING Redis is loading the dataset in memory" ]; then
                echo "Redis ready"
              fi
              SCRIPT
          env:
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: authelia-rediscreds
                  key: plainhost
            - name: REDIS_PASSWORD
              value: PLACEHOLDERPASSWORD
            - name: REDIS_PORT
              value: "6379"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 568
            runAsNonRoot: true
            runAsUser: 568
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: devshm
              mountPath: /dev/shm
            - name: shared
              mountPath: /shared
            - name: tmp
              mountPath: /tmp
            - name: varlogs
              mountPath: /var/logs
            - name: varrun
              mountPath: /var/run
      containers:
        - name: authelia
          image: ghcr.io/authelia/authelia:4.39.15@sha256:d23ee3c721d465b4749cc58541cda4aebe5aa6f19d7b5ce0afebb44ebee69591
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: US/Central
            - name: AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET
              value: ${VOLSYNC_BACKUP_MAIN_ENCRKEY}
            - name: AUTHELIA_SERVER_ADDRESS
              value: tcp://:9091/
            - name: AUTHELIA_SERVER_DISABLE_HEALTHCHECK
              value: "true"
            - name: AUTHELIA_SESSION_REDIS_DATABASE_INDEX
              value: "0"
            - name: AUTHELIA_SESSION_REDIS_HOST
              value: authelia-redis
            - name: AUTHELIA_SESSION_REDIS_PASSWORD
              value: PLACEHOLDERPASSWORD
            - name: AUTHELIA_SESSION_REDIS_PORT
              value: "6379"
            - name: AUTHELIA_SESSION_SECRET
              value: ${VOLSYNC_BACKUP_MAIN_ENCRKEY}
            - name: AUTHELIA_STORAGE_ENCRYPTION_KEY
              value: ${VOLSYNC_BACKUP_MAIN_ENCRKEY}
            - name: AUTHELIA_STORAGE_POSTGRES_ADDRESS
              value: tcp://authelia-cnpg-main-rw:5432/
            - name: AUTHELIA_STORAGE_POSTGRES_DATABASE
              value: authelia
            - name: AUTHELIA_STORAGE_POSTGRES_PASSWORD
              value: ${AUTHELIA_CNPG_PASSWORD}
            - name: AUTHELIA_STORAGE_POSTGRES_USERNAME
              value: authelia
            - name: X_AUTHELIA_CONFIG
              value: /configuration.yaml
            - name: X_AUTHELIA_CONFIG_FILTERS
              value: template
          ports:
            - name: main
              containerPort: 9091
          startupProbe:
            httpGet:
              path: /api/health
              port: 9091
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /api/health
              port: 9091
            initialDelaySeconds: 10
            periodSeconds: 12
            timeoutSeconds: 5
            successThreshold: 2
            failureThreshold: 4
          livenessProbe:
            httpGet:
              path: /api/health
              port: 9091
            initialDelaySeconds: 12
            periodSeconds: 15
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 5
          resources:
            limits:
              cpu: 1500m
              memory: 2400Mi
            requests:
              cpu: 75m
              memory: 200Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 568
            runAsNonRoot: true
            runAsUser: 568
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: config
              mountPath: /config
            - name: configfile
              mountPath: /configuration.yaml
              subPath: configuration.yaml
              readOnly: true
            - name: devshm
              mountPath: /dev/shm
            - name: secrets
              mountPath: /config/secrets
              readOnly: true
            - name: shared
              mountPath: /shared
            - name: tmp
              mountPath: /tmp
            - name: varlogs
              mountPath: /var/logs
            - name: varrun
              mountPath: /var/run
      securityContext:
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups:
          - 568
      volumes:
        - name: configfile
          configMap:
            name: authelia-configfile
        - name: devshm
          emptyDir:
            medium: Memory
            sizeLimit: 2400Mi
        - name: shared
          emptyDir: {}
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 2400Mi
        - name: varlogs
          emptyDir:
            medium: Memory
            sizeLimit: 2400Mi
        - name: varrun
          emptyDir:
            medium: Memory
            sizeLimit: 2400Mi
        - name: config
          persistentVolumeClaim:
            claimName: authelia-config-longhorn
        - name: secrets
          secret:
            secretName: authelia-oidc-secret
---
apiVersion: v1
kind: Service
metadata:
  name: authelia
spec:
  type: LoadBalancer
  allocateLoadBalancerNodePorts: false
  loadBalancerIP: ${AUTHELIA_IP}
  selector:
    app.kubernetes.io/instance: authelia
    app.kubernetes.io/name: authelia
    pod.name: main
  ports:
    - name: main
      port: 9091
      targetPort: 9091
