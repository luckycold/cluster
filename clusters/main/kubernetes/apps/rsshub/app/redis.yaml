apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rsshub-redis
  annotations:
    # Temporary migration aid while moving from HelmRelease -> raw manifests.
    # Remove once transition is stable.
    kustomize.toolkit.fluxcd.io/force: enabled
spec:
  serviceName: rsshub-redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: rsshub
      app.kubernetes.io/name: redis
      pod.name: main
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: rsshub
        app.kubernetes.io/name: redis
        pod.name: main
    spec:
      containers:
        - name: rsshub-redis
          # renovate: datasource=docker depName=bitnamisecure/valkey
          image: docker.io/bitnamisecure/valkey:latest@sha256:97260e00bdf1fa52217005382e69733a36cb36121ba3696abe75cc9f26377136
          imagePullPolicy: IfNotPresent
          env:
            - name: ALLOW_EMPTY_PASSWORD
              value: "yes"
            - name: VALKEY_PORT
              value: "6379"
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 10
            periodSeconds: 12
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 12
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: rsshub-redis
spec:
  selector:
    app.kubernetes.io/instance: rsshub
    app.kubernetes.io/name: redis
    pod.name: main
  ports:
    - name: redis
      port: 6379
      targetPort: redis
