apiVersion: apps/v1
kind: Deployment
metadata:
  name: rsshub
  annotations:
    # Temporary migration aid while moving from HelmRelease -> raw manifests.
    # Remove once transition is stable.
    kustomize.toolkit.fluxcd.io/force: enabled
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: rsshub
      app.kubernetes.io/name: rsshub
      pod.name: main
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: rsshub
        app.kubernetes.io/name: rsshub
        pod.name: main
    spec:
      containers:
        - name: rsshub
          # renovate: datasource=docker depName=diygod/rsshub
          image: diygod/rsshub:latest@sha256:1645902cc1091bf3f2c0c00a773bb8c967da8ce9de4bcac6c3934243216667ae
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: US/Central
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "10191"
            - name: CACHE_TYPE
              value: redis
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: rsshub-rediscreds
                  key: url
            - name: DISALLOW_ROBOT
              value: "true"
            - name: TITLE_LENGTH_LIMIT
              value: "150"
            - name: GITHUB_ACCESS_TOKEN
              value: ""
            - name: PUPPETEER_WS_ENDPOINT
              value: ws://localhost:3000
            - name: ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: rsshub-secrets
                  key: ACCESS_KEY
                  optional: true
            - name: TWITTER_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rsshub-secrets
                  key: TWITTER_AUTH_TOKEN
                  optional: true
            - name: YOUTUBE_KEY
              valueFrom:
                secretKeyRef:
                  name: rsshub-secrets
                  key: YOUTUBE_KEY
                  optional: true
            - name: PATREON_SESSION_ID
              valueFrom:
                secretKeyRef:
                  name: rsshub-secrets
                  key: PATREON_COOKIE
                  optional: true
            - name: LOCALS_SESSION
              value: ${RSSHUB_LOCALS_SESSION}
            - name: SPOTIFY_CLIENT_ID
              value: ${RSSHUB_SPOTIFY_CLIENT_ID}
            - name: SPOTIFY_CLIENT_SECRET
              value: ${RSSHUB_SPOTIFY_CLIENT_SECRET}
            - name: FOLLOW_OWNER_USER_ID
              value: luckycold
            - name: FOLLOW_DESCRIPTION
              value: Lucky's instance
            - name: FOLLOW_PRICE
              value: "100"
            - name: FOLLOW_USER_LIMIT
              value: "1000"
          ports:
            - name: http
              containerPort: 10191
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 12
            timeoutSeconds: 5
            successThreshold: 2
            failureThreshold: 4
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 12
            periodSeconds: 15
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rsshub
spec:
  selector:
    app.kubernetes.io/instance: rsshub
    app.kubernetes.io/name: rsshub
    pod.name: main
  ports:
    - name: http
      port: 10191
      targetPort: http
