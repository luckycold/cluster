apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: romm-config-pcloud
spec:
  paused: true
  sourcePVC: romm-config-longhorn
  trigger:
    schedule: "0 0 * * *"
  restic:
    repository: romm-config-volsync-pcloud
    copyMethod: Snapshot
    pruneIntervalDays: 7
    cacheCapacity: 10Gi
    retain:
      daily: 3
      weekly: 4
      monthly: 2
      within: 30d
    accessModes:
      - ReadWriteOnce
    moverSecurityContext:
      runAsUser: 0
      runAsGroup: 0
      fsGroup: 568
