---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: spegel
  namespace: spegel
spec:
  interval: 30m
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: DaemonSet
              name: spegel
            patch: |
              - op: replace
                path: /spec/template/spec/volumes/6/hostPath/path
                value: /var/lib/rancher/k3s/agent/containerd/io.containerd.content.v1.content
              - op: replace
                path: /spec/template/spec/volumes/7/hostPath/path
                value: /run/k3s/containerd/containerd.sock
              - op: replace
                path: /spec/template/spec/containers/0/args/7
                value: --containerd-sock=/run/containerd/containerd.sock
              - op: replace
                path: /spec/template/spec/containers/0/args/12
                value: --containerd-content-path=/var/lib/containerd/io.containerd.content.v1.content
  chart:
    spec:
      chart: spegel
      version: 4.20.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values: {}
